<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UTAS Moodle Support</title>
<style>
  :root {
    --bg-1: #f4f7ff;
    --bg-2: #eef2ff;
    --primary: #2f3fa3;
    --primary-hover: #24348c;
    --text: #1f2937;
    --muted: #6b7280;
    --card: #ffffff;
    --shadow: 0 15px 40px rgba(31, 41, 55, 0.12);
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: "Segoe UI", Tahoma, Arial, sans-serif;
    background: linear-gradient(165deg, var(--bg-1) 0%, var(--bg-2) 100%);
    color: var(--text);
    display: grid;
    place-items: center;
    padding: 24px;
  }

  .app {
    width: min(100%, 980px);
    background: var(--card);
    border-radius: 24px;
    box-shadow: var(--shadow);
    overflow: hidden;
    display: grid;
    grid-template-columns: 1fr 1fr;
  }

  .left-panel {
    background: linear-gradient(180deg, #31439e 0%, #27348d 100%);
    color: #fff;
    padding: 42px 38px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 16px;
  }

  .logo {
    width: 94px;
    height: auto;
    border-radius: 14px;
    background: multiply;
    mix-blend-mode: multiply;
    isolation: isolate;
  }

  .left-panel h1 {
    margin: 0;
    font-size: 30px;
    line-height: 1.2;
  }

  .left-panel p {
    margin: 0;
    color: rgba(255, 255, 255, 0.86);
    line-height: 1.6;
    font-size: 15px;
  }

  .right-panel {
    padding: 42px 38px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 14px;
  }

  .eyebrow {
    margin: 0;
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  h2 {
    margin: 0;
    font-size: 28px;
    line-height: 1.3;
  }

  .hint {
    margin: 0 0 4px;
    color: var(--muted);
    line-height: 1.6;
    font-size: 15px;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    text-decoration: none;
    border: 0;
    border-radius: 14px;
    padding: 14px 16px;
    font-size: 16px;
    font-weight: 600;
    color: #fff;
    background: var(--primary);
    transition: background 0.2s ease, transform 0.2s ease;
  }

  .btn:hover {
    background: var(--primary-hover);
    transform: translateY(-1px);
  }

  .email-note {
    margin: 8px 0 0;
    font-size: 13px;
    color: var(--muted);
    word-break: break-word;
  }

  @media (max-width: 900px) {
    .app {
      grid-template-columns: 1fr;
      border-radius: 20px;
    }

    .left-panel,
    .right-panel {
      padding: 30px 24px;
    }

    .left-panel h1 {
      font-size: 26px;
    }

    h2 {
      font-size: 24px;
    }
  }

  @media (max-width: 480px) {
    body {
      padding: 14px;
    }

    .app {
      border-radius: 16px;
    }

    .logo {
      width: 80px;
    }

    .left-panel,
    .right-panel {
      padding: 22px 18px;
    }

    .left-panel h1 {
      font-size: 22px;
    }

    h2 {
      font-size: 21px;
    }
  }
</style>
</head>
<body>
  <main class="app">
    <section class="left-panel">
      <img class="logo" src="logo.png" alt="UTAS Logo">
      <h1>UTAS Moodle Help</h1>
      <p>
        Quickly contact Moodle support from any device with a clean desktop
        and mobile-friendly experience.
      </p>
    </section>

    <section class="right-panel">
      <p class="eyebrow">Support Access</p>
      <h2>Send Email</h2>
      <p class="hint">
        Tap the button below to open Outlook and send your support request.
      </p>

      <a class="btn" id="emailBtn"
         href="mailto:lmssupport.nizwa@utas.edu.om?subject=Moodle%20Login%20Issue">
        Open in Outlook
      </a>
      <p class="email-note">lmssupport.nizwa@utas.edu.om</p>
    </section>
  </main>
  <script>
    (function () {
      var to = "lmssupport.nizwa@utas.edu.om";
      var subject = "Moodle Login Issue";
      var bodyLines = [
        "أواجه مشكلة في الدخول إلى نظام المودل الخاص بي.",
        "رقم البطاقة المدنية: ( )",
        "",
        "أرجو منكم التكرم بالمساعدة في حل المشكلة في أقرب وقت ممكن.",
        "شاكرين تعاونكم.",
        "",
        "",
        "I am facing an issue logging into the Moodle system.",
        "Civil ID Number: ( )",
        "",
        "Kindly assist me in resolving this issue as soon as possible.",
        "Thank you for your cooperation."
      ];
      var body = bodyLines.join("\n");
      var encodedTo = encodeURIComponent(to);
      var encodedSubject = encodeURIComponent(subject);
      var encodedBody = encodeURIComponent(body);
      var mailtoLink = "mailto:" + to + "?subject=" + encodedSubject + "&body=" + encodedBody;
      var iosOutlookLink = "ms-outlook://compose?to=" + encodedTo + "&subject=" + encodedSubject + "&body=" + encodedBody;
      var webOutlookLink = "https://outlook.office.com/mail/deeplink/compose?to=" + encodedTo + "&subject=" + encodedSubject + "&body=" + encodedBody;
      var btn = document.getElementById("emailBtn");

      if (!btn) {
        return;
      }

      btn.addEventListener("click", function (event) {
        event.preventDefault();

        var ua = navigator.userAgent || "";
        var isIOS = /iPhone|iPad|iPod/i.test(ua);

        if (isIOS) {
          window.location.href = iosOutlookLink;
          setTimeout(function () {
            window.location.href = mailtoLink;
          }, 1200);
          return;
        }

        window.location.href = mailtoLink;
        setTimeout(function () {
          window.open(webOutlookLink, "_blank");
        }, 900);
      });
    })();
  </script>
</body>
</html>
